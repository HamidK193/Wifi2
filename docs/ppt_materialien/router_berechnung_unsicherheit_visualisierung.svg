<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font-family: Aptos, Arial, sans-serif; font-size: 44px; font-weight: 800; fill: #111827; }
      .subtitle { font-family: Aptos, Arial, sans-serif; font-size: 24px; fill: #374151; }
      .boxTitle { font-family: Aptos, Arial, sans-serif; font-size: 25px; font-weight: 800; fill: #111827; }
      .boxText { font-family: Aptos, Arial, sans-serif; font-size: 18px; fill: #374151; }
      .small { font-family: Aptos, Arial, sans-serif; font-size: 16px; fill: #4b5563; }
      .code { font-family: Consolas, monospace; font-size: 16px; fill: #1f2937; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 20; }
      .stage { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .warnStage { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 16; }
      .goodStage { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 16; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; stroke-linecap: round; }
      .circleA { fill: #f97316; fill-opacity: 0.12; stroke: #f97316; stroke-width: 4; stroke-dasharray: 10 8; }
      .circleB { fill: #2563eb; fill-opacity: 0.10; stroke: #2563eb; stroke-width: 4; stroke-dasharray: 10 8; }
      .circleC { fill: #16a34a; fill-opacity: 0.10; stroke: #16a34a; stroke-width: 4; stroke-dasharray: 10 8; }
      .measure { fill: #111827; stroke: #ffffff; stroke-width: 4; }
      .router { fill: #dc2626; stroke: #ffffff; stroke-width: 5; }
      .uncertain { fill: #dc2626; fill-opacity: 0.12; stroke: #dc2626; stroke-width: 3; stroke-dasharray: 8 8; }
      .residual { stroke: #64748b; stroke-width: 4; fill: none; stroke-linecap: round; stroke-dasharray: 8 8; }
      .cross { stroke: #dc2626; stroke-width: 5; fill: none; stroke-linecap: round; }
      .tick { stroke: #16a34a; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowHead" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>

  <text x="80" y="78" class="title">Routerberechnung aus RSSI-Kreisen</text>
  <text x="82" y="120" class="subtitle">Der Routerstandort ist eine Schaetzung: Wenige Scans und schwankende RSSI-Werte machen ihn unsicher.</text>

  <rect x="70" y="165" width="1460" height="610" class="panel" filter="url(#shadow)"/>

  <rect x="110" y="220" width="350" height="420" class="warnStage"/>
  <text x="145" y="272" class="boxTitle">1. Zu wenige Scans</text>
  <text x="145" y="310" class="boxText">Mit weniger als 3 Messpunkten</text>
  <text x="145" y="336" class="boxText">ist der Routerstandort unsicher.</text>

  <circle cx="225" cy="465" r="95" class="circleA"/>
  <circle cx="340" cy="380" r="82" class="circleB"/>
  <circle cx="225" cy="465" r="12" class="measure"/>
  <circle cx="340" cy="380" r="12" class="measure"/>
  <path d="M270 305 L300 335 M300 305 L270 335" class="cross"/>
  <text x="145" y="598" class="small">Zwei Kreise liefern noch keinen</text>
  <text x="145" y="623" class="small">stabilen Schnittbereich.</text>

  <path d="M480 430 L555 430" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="575" y="220" width="430" height="420" class="stage"/>
  <text x="610" y="272" class="boxTitle">2. RSSI-Radien pruefen</text>
  <text x="610" y="310" class="boxText">Jeder Scan liefert einen Radius,</text>
  <text x="610" y="336" class="boxText">aber RSSI ist nur eine Naeherung.</text>

  <circle cx="710" cy="465" r="105" class="circleA"/>
  <circle cx="830" cy="385" r="92" class="circleB"/>
  <circle cx="880" cy="515" r="82" class="circleC"/>
  <circle cx="710" cy="465" r="12" class="measure"/>
  <circle cx="830" cy="385" r="12" class="measure"/>
  <circle cx="880" cy="515" r="12" class="measure"/>
  <rect x="620" y="565" width="330" height="44" fill="#f8fafc" stroke="#e5e7eb" stroke-width="2" rx="10"/>
  <text x="645" y="593" class="code">scan_count &gt;= 3</text>
  <path d="M906 580 L918 592 L940 568" class="tick"/>

  <path d="M1025 430 L1100 430" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="1120" y="220" width="365" height="420" class="goodStage"/>
  <text x="1150" y="272" class="boxTitle">3. Bester Punkt</text>
  <text x="1150" y="310" class="boxText">Gesucht wird der Punkt mit dem</text>
  <text x="1150" y="336" class="boxText">kleinsten Fehler zu allen Kreisen.</text>

  <circle cx="1225" cy="470" r="100" class="circleA"/>
  <circle cx="1335" cy="390" r="88" class="circleB"/>
  <circle cx="1370" cy="525" r="82" class="circleC"/>
  <ellipse cx="1305" cy="458" rx="70" ry="45" class="uncertain"/>
  <circle cx="1225" cy="470" r="12" class="measure"/>
  <circle cx="1335" cy="390" r="12" class="measure"/>
  <circle cx="1370" cy="525" r="12" class="measure"/>
  <circle cx="1305" cy="458" r="15" class="router"/>
  <path d="M1305 458 L1275 435" class="residual"/>
  <path d="M1305 458 L1332 480" class="residual"/>
  <rect x="1160" y="565" width="285" height="44" fill="#ffffff" stroke="#bfdbfe" stroke-width="2" rx="10"/>
  <text x="1188" y="593" class="code">kleinstes RMSE</text>

  <rect x="315" y="700" width="915" height="48" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="12"/>
  <text x="345" y="731" class="small">Wichtig: Der Punkt ist eine Schaetzung, keine exakt bekannte Routerposition.</text>
</svg>
