<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font-family: Aptos, Arial, sans-serif; font-size: 44px; font-weight: 800; fill: #111827; }
      .subtitle { font-family: Aptos, Arial, sans-serif; font-size: 24px; fill: #374151; }
      .label { font-family: Aptos, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #111827; }
      .text { font-family: Aptos, Arial, sans-serif; font-size: 19px; fill: #374151; }
      .calloutTitle { font-family: Aptos, Arial, sans-serif; font-size: 20px; font-weight: 800; fill: #111827; }
      .calloutText { font-family: Aptos, Arial, sans-serif; font-size: 16px; fill: #374151; }
      .small { font-family: Aptos, Arial, sans-serif; font-size: 17px; fill: #4b5563; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 20; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .road { stroke: #9ca3af; stroke-width: 16; stroke-linecap: round; fill: none; }
      .path { stroke: #d1d5db; stroke-width: 10; stroke-linecap: round; fill: none; }
      .raw { stroke: #f97316; stroke-width: 3; stroke-dasharray: 8 8; fill: none; }
      .matched { stroke: #2563eb; stroke-width: 6; fill: none; stroke-linecap: round; }
      .gps { stroke: #dc2626; stroke-width: 6; fill: none; stroke-linecap: round; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrowHead" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>

  <text x="80" y="78" class="title">Map-Matching: GPS und WLAN auf begehbare Wege setzen</text>
  <text x="82" y="120" class="subtitle">Rohpunkte können neben dem Weg liegen. Für den Vergleich werden GPS- und WLAN-Route auf plausible OSM-Wege gematcht.</text>

  <rect x="75" y="160" width="1000" height="625" class="panel" filter="url(#shadow)"/>
  <rect x="1115" y="160" width="405" height="625" class="panel" filter="url(#shadow)"/>

  <!-- Karte -->
  <rect x="130" y="220" width="870" height="500" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2" rx="18"/>
  <path d="M180 610 C305 520, 410 455, 535 410 C670 360, 815 305, 945 255" class="road"/>
  <path d="M180 610 C305 520, 410 455, 535 410 C670 360, 815 305, 945 255" class="path"/>
  <path d="M215 315 C360 365, 505 390, 660 380 C785 372, 880 420, 955 505" class="road" opacity="0.45"/>
  <path d="M215 315 C360 365, 505 390, 660 380 C785 372, 880 420, 955 505" class="path" opacity="0.7"/>

  <!-- Rohpunkte bewusst neben dem Weg -->
  <circle cx="285" cy="565" r="13" fill="#f97316" stroke="#ffffff" stroke-width="4"/>
  <circle cx="410" cy="505" r="13" fill="#f97316" stroke="#ffffff" stroke-width="4"/>
  <circle cx="575" cy="350" r="13" fill="#f97316" stroke="#ffffff" stroke-width="4"/>
  <circle cx="785" cy="250" r="13" fill="#f97316" stroke="#ffffff" stroke-width="4"/>
  <path d="M285 565 L410 505 L575 350 L785 250" class="raw"/>

  <!-- Gesnappte WLAN-Route auf dem Weg -->
  <path d="M315 520 C430 455, 545 405, 675 355 C760 322, 835 292, 910 265" class="matched"/>
  <circle cx="315" cy="520" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
  <circle cx="430" cy="455" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
  <circle cx="675" cy="355" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
  <circle cx="910" cy="265" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>

  <!-- GPS-Route -->
  <path d="M195 620 C320 530, 425 462, 550 418 C680 370, 825 315, 952 270" class="gps" opacity="0.82"/>

  <!-- Snap Pfeile: Rohpunkt wird auf Weg gezogen -->
  <path d="M285 565 L315 520" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M410 505 L430 455" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M575 350 L675 355" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M785 250 L910 265" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="158" y="246" width="218" height="88" class="card"/>
  <text x="180" y="278" class="calloutTitle">Roh-WLAN</text>
  <text x="180" y="305" class="calloutText">Orange Punkte liegen</text>
  <text x="180" y="328" class="calloutText">neben dem Weg.</text>

  <rect x="665" y="604" width="255" height="88" class="card"/>
  <text x="690" y="636" class="calloutTitle">Gesnappte Route</text>
  <text x="690" y="663" class="calloutText">Blaue Punkte liegen</text>
  <text x="690" y="686" class="calloutText">auf dem OSM-Weg.</text>

  <rect x="415" y="248" width="232" height="84" class="card"/>
  <text x="438" y="279" class="calloutTitle">Snapping</text>
  <text x="438" y="306" class="calloutText">Pfeile zeigen die</text>
  <text x="438" y="329" class="calloutText">Verschiebung zum Weg.</text>

  <!-- Rechte Erklärung -->
  <text x="1150" y="218" class="label">Warum Snapping?</text>

  <circle cx="1160" cy="265" r="10" fill="#f97316"/>
  <text x="1185" y="272" class="text">Rohpunkte sind unsicher</text>
  <text x="1185" y="298" class="small">GPS und WLAN können abweichen</text>

  <circle cx="1160" cy="345" r="10" fill="#9ca3af"/>
  <text x="1185" y="352" class="text">OSM-Wege als Realität</text>
  <text x="1185" y="378" class="small">Person läuft auf Wegen</text>

  <circle cx="1160" cy="425" r="10" fill="#2563eb"/>
  <text x="1185" y="432" class="text">WLAN-Route snappen</text>
  <text x="1185" y="458" class="small">Schätzung auf plausible Wege</text>

  <circle cx="1160" cy="505" r="10" fill="#dc2626"/>
  <text x="1185" y="512" class="text">GPS auch matchen</text>
  <text x="1185" y="538" class="small">fairerer Vergleich</text>

  <rect x="1150" y="585" width="325" height="150" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" rx="14"/>
  <text x="1170" y="620" class="label">Wichtig</text>
  <text x="1170" y="654" class="small">Nutzerpositionen werden</text>
  <text x="1170" y="681" class="small">auf Wege gesetzt.</text>
  <text x="1170" y="708" class="small">Routerstandorte nicht,</text>
  <text x="1170" y="735" class="small">weil Router in Gebäuden sein können.</text>

  <text x="82" y="835" class="small">Merksatz: Snapping macht den Laufweg plausibler, ersetzt aber keine echte Messgenauigkeit.</text>
</svg>
