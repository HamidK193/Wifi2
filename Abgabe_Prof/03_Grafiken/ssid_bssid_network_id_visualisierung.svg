<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font-family: Aptos, Arial, sans-serif; font-size: 44px; font-weight: 800; fill: #111827; }
      .subtitle { font-family: Aptos, Arial, sans-serif; font-size: 24px; fill: #374151; }
      .label { font-family: Aptos, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #111827; }
      .text { font-family: Aptos, Arial, sans-serif; font-size: 20px; fill: #374151; }
      .small { font-family: Aptos, Arial, sans-serif; font-size: 17px; fill: #4b5563; }
      .code { font-family: Consolas, monospace; font-size: 19px; fill: #111827; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 20; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .bad { fill: #fef2f2; stroke: #fecaca; stroke-width: 2; rx: 14; }
      .good { fill: #ecfdf5; stroke: #bbf7d0; stroke-width: 2; rx: 14; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrowHead" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>

  <text x="80" y="78" class="title">Warum SSID + BSSID als Netzwerkeinheit?</text>
  <text x="82" y="120" class="subtitle">Eine SSID kann mehrfach vorkommen. Die BSSID unterscheidet die konkreten Access Points.</text>

  <rect x="80" y="165" width="1440" height="610" class="panel" filter="url(#shadow)"/>

  <!-- Problem side -->
  <rect x="130" y="225" width="600" height="450" class="bad"/>
  <text x="165" y="270" class="label">Problem: SSID allein reicht nicht</text>

  <rect x="175" y="325" width="220" height="115" class="card"/>
  <circle cx="220" cy="365" r="18" fill="#2563eb"/>
  <text x="255" y="370" class="label">eduroam</text>
  <text x="195" y="410" class="code">BSSID A</text>

  <rect x="465" y="325" width="220" height="115" class="card"/>
  <circle cx="510" cy="365" r="18" fill="#16a34a"/>
  <text x="545" y="370" class="label">eduroam</text>
  <text x="485" y="410" class="code">BSSID B</text>

  <rect x="320" y="500" width="245" height="92" fill="#ffffff" stroke="#fecaca" stroke-width="2" rx="14"/>
  <text x="345" y="535" class="text">gleicher Name</text>
  <text x="345" y="565" class="text">aber anderer Router</text>

  <path d="M395 382 L465 382" class="arrow" marker-end="url(#arrowHead)"/>
  <text x="170" y="635" class="small">Wenn wir nur die SSID nutzen, würden mehrere Access Points vermischt.</text>

  <!-- Solution side -->
  <rect x="870" y="225" width="600" height="450" class="good"/>
  <text x="905" y="270" class="label">Lösung: network_id bilden</text>

  <rect x="930" y="330" width="225" height="95" class="card"/>
  <text x="955" y="365" class="label">SSID</text>
  <text x="955" y="397" class="code">eduroam</text>

  <rect x="1195" y="330" width="225" height="95" class="card"/>
  <text x="1220" y="365" class="label">BSSID</text>
  <text x="1220" y="397" class="code">f8:c6:50:...</text>

  <text x="1167" y="392" class="label">+</text>
  <path d="M1175 430 L1175 485" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="950" y="505" width="450" height="105" fill="#ffffff" stroke="#bbf7d0" stroke-width="2" rx="16"/>
  <text x="985" y="545" class="label">network_id</text>
  <text x="985" y="582" class="code">eduroam + f8:c6:50:...</text>

  <text x="910" y="635" class="small">Damit beschreibt jede Zeile einen konkreteren Access Point im Kontext seines Netzwerknamens.</text>

  <!-- Center bridge -->
  <path d="M750 450 L850 450" class="arrow" marker-end="url(#arrowHead)"/>
  <text x="760" y="420" class="small">eindeutig</text>
  <text x="760" y="480" class="small">modellieren</text>

  <rect x="260" y="705" width="1080" height="52" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" rx="14"/>
  <text x="285" y="739" class="small">Merksatz: In unserem Projekt ist ein Netzwerk immer die Kombination aus SSID und BSSID.</text>
</svg>
