<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="585" viewBox="70 165 1460 610">
  <defs>
    <style>
      .title { font-family: Aptos, Arial, sans-serif; font-size: 44px; font-weight: 800; fill: #111827; }
      .subtitle { font-family: Aptos, Arial, sans-serif; font-size: 24px; fill: #374151; }
      .boxTitle { font-family: Aptos, Arial, sans-serif; font-size: 23px; font-weight: 800; fill: #111827; }
      .boxText { font-family: Aptos, Arial, sans-serif; font-size: 17px; fill: #374151; }
      .small { font-family: Aptos, Arial, sans-serif; font-size: 16px; fill: #4b5563; }
      .file { font-family: Consolas, monospace; font-size: 15px; fill: #1f2937; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 20; }
      .stage { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrowHead" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>

  <text x="80" y="78" class="title">Technische Pipeline bis zum Laufweg-Vergleich</text>
  <text x="82" y="120" class="subtitle">Aus WiGLE-Rohdaten werden bereinigte WLAN-Daten, geschätzte Routen und am Ende der GPS-vs-WLAN-Vergleich.</text>

  <rect x="70" y="165" width="1460" height="610" class="panel" filter="url(#shadow)"/>

  <!-- Stages row 1 -->
  <rect x="115" y="225" width="250" height="150" class="stage"/>
  <text x="145" y="265" class="boxTitle">1. Rohdaten</text>
  <text x="145" y="300" class="boxText">WiGLE-CSV laden</text>
  <text x="145" y="326" class="boxText">OSM-Karte laden</text>
  <text x="145" y="354" class="file">data/raw/</text>

  <path d="M375 300 L445 300" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="455" y="225" width="250" height="150" class="stage"/>
  <text x="485" y="265" class="boxTitle">2. Bereinigung</text>
  <text x="485" y="300" class="boxText">nur WIFI</text>
  <text x="485" y="326" class="boxText">Zeitstempel prüfen</text>
  <text x="485" y="354" class="file">wifi_scans_clean.csv</text>

  <path d="M715 300 L785 300" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="795" y="225" width="250" height="150" class="stage"/>
  <text x="825" y="265" class="boxTitle">3. Netzwerke</text>
  <text x="825" y="300" class="boxText">SSID + BSSID</text>
  <text x="825" y="326" class="boxText">als network_id</text>
  <text x="825" y="354" class="file">network_summary.csv</text>

  <path d="M1055 300 L1125 300" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="1135" y="225" width="250" height="150" class="stage"/>
  <text x="1165" y="265" class="boxTitle">4. Router</text>
  <text x="1165" y="300" class="boxText">RSSI-Kreise</text>
  <text x="1165" y="326" class="boxText">Standort schätzen</text>
  <text x="1165" y="354" class="file">access_points.csv</text>

  <!-- Down arrow -->
  <path d="M1260 385 L1260 455" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- Stages row 2 reversed -->
  <rect x="1135" y="465" width="250" height="150" class="stage"/>
  <text x="1165" y="505" class="boxTitle">5. WKNN-Route</text>
  <text x="1165" y="540" class="boxText">ähnliche Scans</text>
  <text x="1165" y="566" class="boxText">gewichten</text>
  <text x="1165" y="594" class="file">route_wknn.csv</text>

  <path d="M1125 540 L1055 540" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="795" y="465" width="250" height="150" class="stage"/>
  <text x="825" y="505" class="boxTitle">6. Snapping</text>
  <text x="825" y="540" class="boxText">GPS und WLAN</text>
  <text x="825" y="566" class="boxText">auf OSM-Wege</text>
  <text x="825" y="594" class="file">matched.csv</text>

  <path d="M785 540 L715 540" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="455" y="465" width="250" height="150" class="stage"/>
  <text x="485" y="505" class="boxTitle">7. Ausreißer</text>
  <text x="485" y="540" class="boxText">Fehler prüfen</text>
  <text x="485" y="566" class="boxText">Gründe speichern</text>
  <text x="485" y="594" class="file">outliers.csv</text>

  <path d="M445 540 L375 540" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="115" y="465" width="250" height="150" class="stage"/>
  <text x="145" y="505" class="boxTitle">8. App-Ansicht</text>
  <text x="145" y="540" class="boxText">rote GPS-Route</text>
  <text x="145" y="566" class="boxText">blaue WLAN-Route</text>
  <text x="145" y="594" class="file">Laufweg-Vergleich</text>

  <rect x="225" y="680" width="1150" height="52" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" rx="14"/>
  <text x="250" y="714" class="small">Merksatz: Die App berechnet den Laufweg nicht live, sondern lädt vorberechnete CSV-Artefakte aus data/processed/.</text>
</svg>
